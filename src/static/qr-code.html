<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>班级助手2.0 - 访问二维码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 32px; }
    .qr-container {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrcode { width: 220px; height: 220px; }
    #qrcode img { width: 100%; height: 100%; border-radius: 8px; }
    #qrcode canvas { width: 100%; height: 100%; border-radius: 8px; }
    .link-section { margin-bottom: 24px; }
    .link-label { font-size: 12px; color: #999; margin-bottom: 8px; display: block; }
    .link-value {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      word-break: break-all;
      text-align: left;
      line-height: 1.5;
    }
    .copy-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
      margin-bottom: 12px;
    }
    .copy-btn:active { transform: scale(0.98); }
    .save-btn {
      width: 100%;
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .save-btn:active { transform: scale(0.98); background: #f0f4ff; }
    .tips {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      text-align: left;
    }
    .tips h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .tips ul { list-style: none; padding: 0; }
    .tips li {
      font-size: 13px;
      color: #666;
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #52c41a;
      font-weight: bold;
    }
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; visibility: visible; }
    .footer { margin-top: 32px; text-align: center; }
    .footer p { font-size: 12px; color: rgba(255, 255, 255, 0.7); }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
    }
    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">班</div>
    <h1>班级助手2.0</h1>
    <p class="subtitle">扫码或复制链接访问系统</p>
    <div class="qr-container">
      <div id="qrcode">
        <div class="loading"><div class="spinner"></div><span>生成二维码中...</span></div>
      </div>
    </div>
    <div class="link-section"><span class="link-label">访问链接</span><div class="link-value" id="linkValue"></div></div>
    <button class="copy-btn" id="copyBtn">复制链接</button>
    <button class="save-btn" id="saveBtn">保存二维码</button>
    <div class="tips">
      <h3>使用说明</h3>
      <ul>
        <li>使用手机相机扫描二维码进入系统</li>
        <li>复制链接在浏览器中打开访问</li>
        <li>可保存二维码到相册，方便下次访问</li>
        <li>支持iOS、Android、Windows、Mac多端访问</li>
      </ul>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="footer"><p>班级助手2.0 H5版</p></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    (function() {
      var qrContainer = document.getElementById('qrcode');
      var linkValue = document.getElementById('linkValue');
      var copyBtn = document.getElementById('copyBtn');
      var saveBtn = document.getElementById('saveBtn');
      var toast = document.getElementById('toast');
      
      var currentUrl = window.location.href;
      var baseUrl = currentUrl.replace(/qr-code\.html$/, '');
      var accessUrl = baseUrl;
      
      linkValue.textContent = accessUrl;
      
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
      }
      
      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(accessUrl).then(function() {
          showToast('链接复制成功');
        }, function() {
          var textArea = document.createElement('textarea');
          textArea.value = accessUrl;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          showToast('链接复制成功');
        });
      });
      
      function generateQRCode() {
        try {
          qrContainer.innerHTML = '';
          var canvas = document.createElement('canvas');
          canvas.width = 220;
          canvas.height = 220;
          qrContainer.appendChild(canvas);
          QRCode.toCanvas(canvas, accessUrl, {
            width: 220,
            margin: 2,
            color: {
              dark: '#000000',
              light: '#ffffff'
            }
          }, function(error) {
            if (error) {
              console.error('QR code generation failed:', error);
              qrContainer.innerHTML = '<div style="color:#ff4d4f;">二维码生成失败，请重试</div>';
            }
          });
        } catch (e) {
          console.error('QR code error:', e);
          qrContainer.innerHTML = '<div style="color:#ff4d4f;">二维码生成失败，请重试</div>';
        }
      }
      
      if (typeof QRCode !== 'undefined') {
        generateQRCode();
      } else {
        var script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload = function() {
          try {
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
              text: accessUrl,
              width: 220,
              height: 220,
              colorDark: '#000000',
              colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel.M
            });
          } catch (e) {
            console.error('QRCode.js error:', e);
            generateQRCode();
          }
        };
        script.onerror = function() {
          generateQRCode();
        };
        document.head.appendChild(script);
      }
      
      saveBtn.addEventListener('click', function() {
        var canvas = qrContainer.querySelector('canvas');
        if (canvas) {
          var link = document.createElement('a');
          link.download = '班级助手2.0二维码.png';
          link.href = canvas.toDataURL('image/png');
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast('二维码保存成功');
        } else {
          var img = qrContainer.querySelector('img');
          if (img) {
            var link = document.createElement('a');
            link.download = '班级助手2.0二维码.png';
            link.href = img.src;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('二维码保存成功');
          } else {
            showToast('二维码尚未生成');
          }
        }
      });
    })();
  </script>
</body>
</html>
