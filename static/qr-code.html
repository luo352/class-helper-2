<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>班级助手2.0 - 访问二维码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 32px; }
    .qr-container {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #qrcode { width: 220px; height: 220px; }
    #qrcode img { width: 100%; height: 100%; border-radius: 8px; }
    .link-section { margin-bottom: 24px; }
    .link-label { font-size: 12px; color: #999; margin-bottom: 8px; display: block; }
    .link-value {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      word-break: break-all;
      text-align: left;
      line-height: 1.5;
    }
    .copy-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
      margin-bottom: 12px;
    }
    .copy-btn:active { transform: scale(0.98); }
    .save-btn {
      width: 100%;
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .save-btn:active { transform: scale(0.98); background: #f0f4ff; }
    .tips {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      text-align: left;
    }
    .tips h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .tips ul { list-style: none; padding: 0; }
    .tips li {
      font-size: 13px;
      color: #666;
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #52c41a;
      font-weight: bold;
    }
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; visibility: visible; }
    .footer { margin-top: 32px; text-align: center; }
    .footer p { font-size: 12px; color: rgba(255, 255, 255, 0.7); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">班</div>
    <h1>班级助手2.0</h1>
    <p class="subtitle">扫码或复制链接访问系统</p>
    <div class="qr-container"><div id="qrcode"></div></div>
    <div class="link-section"><span class="link-label">访问链接</span><div class="link-value" id="linkValue"></div></div>
    <button class="copy-btn" id="copyBtn">复制链接</button>
    <button class="save-btn" id="saveBtn">保存二维码</button>
    <div class="tips">
      <h3>使用说明</h3>
      <ul>
        <li>使用手机相机扫描二维码进入系统</li>
        <li>复制链接在浏览器中打开访问</li>
        <li>可保存二维码到相册，方便下次访问</li>
        <li>支持iOS、Android、Windows、Mac多端访问</li>
      </ul>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="footer"><p>班级助手2.0 H5版</p></div>
  <script>
    (function(){
      var qrContainer = document.getElementById('qrcode');
      var linkValue = document.getElementById('linkValue');
      var copyBtn = document.getElementById('copyBtn');
      var saveBtn = document.getElementById('saveBtn');
      var toast = document.getElementById('toast');
      var currentUrl = window.location.href;
      var baseUrl = currentUrl.replace(/qr-code\.html$/, '');
      var accessUrl = baseUrl;
      linkValue.textContent = accessUrl;
      function showToast(message){ toast.textContent = message; toast.classList.add('show'); setTimeout(function(){ toast.classList.remove('show'); }, 2000); }
      copyBtn.addEventListener('click', function(){
        navigator.clipboard.writeText(accessUrl).then(function(){ showToast('链接复制成功'); }, function(){
          var textArea = document.createElement('textarea'); textArea.value = accessUrl; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); showToast('链接复制成功');
        });
      });
      var QR8bitByte = { getMode:function(){return 4;}, write:function(buffer,data){for(var i=0;i<data.length;i++)buffer.put(data.charCodeAt(i),8);}};
      var QRUtil={G15:(1<<10)|(1<<8)|(1<<5)|(1<<4)|(1<<2)|(1<<1)|(1<<0),G18:(1<<12)|(1<<11)|(1<<10)|(1<<9)|(1<<8)|(1<<5)|(1<<2)|(1<<0),ERROR_CORRECTION_TABLE:{L:1,M:0,Q:3,H:2},PATTERN_POSITION_TABLE:[[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54],[6,32,58],[6,34,62],[6,26,46,66],[6,26,48,70],[6,26,50,74],[6,30,54,78],[6,30,56,82],[6,30,58,86],[6,34,62,90],[6,28,50,72,94],[6,26,50,74,98],[6,30,54,78,102],[6,28,54,80,106],[6,32,58,84,110],[6,30,58,86,114],[6,34,62,90,118],[6,26,50,74,98,122],[6,30,54,78,102,126],[6,26,52,78,104,130],[6,30,56,82,108,134],[6,34,60,86,112,138],[6,30,58,88,118,142],[6,34,62,92,122,146],[6,30,54,78,102,126,150],[6,24,50,76,102,128,154],[6,28,54,80,106,132,158],[6,32,58,84,110,136,162],[6,26,54,82,110,138,166],[6,30,58,86,114,142,170]]};
      var QRMath={glog:function(n){if(n<1)throw new Error('glog('+n+')');return QRMath.LOG_TABLE[n];},gexp:function(n){while(n<0)n+=255;while(n>=256)n-=255;return QRMath.EXP_TABLE[n];}};
      QRMath.EXP_TABLE=new Array(256);QRMath.LOG_TABLE=new Array(256);
      for(var i=0;i<8;i++)QRMath.EXP_TABLE[i]=1<<i;
      for(var i=8;i<256;i++)QRMath.EXP_TABLE[i]=QRMath.EXP_TABLE[i-4]^QRMath.EXP_TABLE[i-5]^QRMath.EXP_TABLE[i-6]^QRMath.EXP_TABLE[i-8];
      for(var i=0;i<255;i++)QRMath.LOG_TABLE[QRMath.EXP_TABLE[i]]=i;
      function QRPolynomial(num,shift){
        if(num.length==undefined)throw new Error(num.length+'/'+shift);
        var offset=0;while(offset<num.length&&num[offset]==0)offset++;
        this.num=new Array(num.length-offset+shift);
        for(var i=0;i<num.length-offset;i++)this.num[i]=num[i+offset];
      }
      QRPolynomial.prototype.get=function(index){return this.num[index];};
      QRPolynomial.prototype.getLength=function(){return this.num.length;};
      QRPolynomial.prototype.multiply=function(e){
        var num=new Array(this.getLength()+e.getLength()-1);
        for(var i=0;i<this.getLength();i++){for(var j=0;j<e.getLength();j++){num[i+j]^=QRMath.gexp(QRMath.glog(this.get(i))+QRMath.glog(e.get(j)));}}
        return new QRPolynomial(num,0);
      };
      QRPolynomial.prototype.mod=function(e){
        if(this.getLength()-e.getLength()<0)return this;
        var ratio=QRMath.glog(this.get(0))-QRMath.glog(e.get(0));
        var num=new Array(this.getLength());for(var i=0;i<this.getLength();i++)num[i]=this.get(i);
        for(var i=0;i<e.getLength();i++)num[i]^=QRMath.gexp(QRMath.glog(e.get(i))+ratio);
        return new QRPolynomial(num,0).mod(e);
      };
      function QRBitBuffer(){this.buffer=[];this.length=0;}
      QRBitBuffer.prototype.getBuffer=function(){return this.buffer;};
      QRBitBuffer.prototype.getLengthInBits=function(){return this.length;};
      QRBitBuffer.prototype.put=function(num,length){for(var i=0;i<length;i++)this.putBit(((num>>>(length-i-1))&1)==1);};
      QRBitBuffer.prototype.putBit=function(bit){
        var bufIndex=Math.floor(this.length/8);
        if(this.buffer.length<=bufIndex)this.buffer.push(0);
        if(bit)this.buffer[bufIndex]|=(0x80>>>(this.length%8));
        this.length++;
      };
      var QRRSBlock={
        RS_BLOCK_TABLE:[[[1,26,19]],[[1,44,34]],[[1,70,55]],[[1,100,80]],[[1,134,108]],[[2,86,68]],[[2,108,86]],[[2,134,108]],[[2,154,124]],[[2,192,154]],[[4,144,116]],[[2,154,124],[2,152,122]],[[4,144,116]],[[3,142,114],[1,144,116]],[[5,144,116]],[[5,142,114],[1,144,116]],[[5,154,124],[1,152,122]],[[5,154,124],[1,152,122],[1,154,124]],[[6,154,124],[2,152,122]],[[6,154,124],[2,152,122],[2,154,124]],[[7,154,124],[2,152,122],[1,154,124]],[[8,154,124],[2,152,122]],[[9,154,124],[2,152,122]],[[10,154,124],[2,152,122]],[[11,154,124],[2,152,122]],[[12,154,124],[2,152,122]],[[12,154,124],[3,152,122]],[[13,154,124],[3,152,122]],[[14,154,124],[3,152,122]],[[15,154,124],[3,152,122]],[[16,154,124],[3,152,122]],[[17,154,124],[3,152,122]],[[18,154,124],[3,152,122]],[[19,154,124],[3,152,122]],[[19,154,124],[4,152,122]],[[20,154,124],[4,152,122]]],
        getRSBlocks:function(typeNumber,errorCorrectionLevel){
          var rsBlock=QRRSBlock.getRsBlockTable(typeNumber,errorCorrectionLevel);
          var length=rsBlock.length/3;var list=[];
          for(var i=0;i<length;i++){
            var count=rsBlock[i*3+0];var totalCount=rsBlock[i*3+1];var dataCount=rsBlock[i*3+2];
            for(var j=0;j<count;j++)list.push(new QRRSBlock(totalCount,dataCount));
          }
          return list;
        },
        getRsBlockTable:function(typeNumber,errorCorrectionLevel){
          return QRRSBlock.RS_BLOCK_TABLE[(typeNumber-1)*4+QRUtil.ERROR_CORRECTION_TABLE[errorCorrectionLevel]];
        },
        getErrorCorrectPolynomial:function(errorCorrectionLength){
          var a=new QRPolynomial([1],0);
          for(var i=0;i<errorCorrectionLength;i++){a=a.multiply(new QRPolynomial([1,QRMath.gexp(i)],0));}
          return a;
        }
      };
      function QRRSBlock(totalCount,dataCount){this.totalCount=totalCount;this.dataCount=dataCount;}
      function QRCode(){this.typeNumber=0;this.errorCorrectionLevel='M';this.modules=null;this.moduleCount=0;this.dataCache=null;}
      QRCode.prototype.addData=function(data){if(this.dataCache==null)this.dataCache='';this.dataCache+=data;};
      QRCode.prototype.isDark=function(row,col){if(row<0||this.moduleCount<=row||col<0||this.moduleCount<=col)throw new Error(row+','+col);return this.modules[row][col];};
      QRCode.prototype.getModuleCount=function(){return this.moduleCount;};
      QRCode.prototype.make=function(){this.makeImpl(false,this.getBestMaskPattern());};
      QRCode.prototype.makeImpl=function(test,maskPattern){
        this.moduleCount=this.typeNumber*4+17;
        this.modules=new Array(this.moduleCount);
        for(var row=0;row<this.moduleCount;row++){this.modules[row]=new Array(this.moduleCount);for(var col=0;col<this.moduleCount;col++)this.modules[row][col]=null;}
        this.setupPositionProbePattern(0,0);this.setupPositionProbePattern(this.moduleCount-7,0);this.setupPositionProbePattern(0,this.moduleCount-7);
        this.setupPositionAdjustPattern();this.setupTimingPattern();this.setupTypeInfo(test,maskPattern);
        if(this.typeNumber>=7)this.setupTypeNumber(test);
        if(this.dataCache!=null){var data=QRCode.createData(this.typeNumber,this.errorCorrectionLevel,this.dataCache);this.mapData(data,maskPattern);}
      };
      QRCode.prototype.getBestMaskPattern=function(){
        var minLostPoint=0;var pattern=0;
        for(var i=0;i<8;i++){this.makeImpl(true,i);var lostPoint=QRUtil.getLostPoint(this);if(i==0||minLostPoint>lostPoint){minLostPoint=lostPoint;pattern=i;}}
        return pattern;
      };
      QRCode.createData=function(typeNumber,errorCorrectionLevel,data){
        var rsBlocks=QRRSBlock.getRSBlocks(typeNumber,errorCorrectionLevel);
        var buffer=new QRBitBuffer();buffer.put(QR8bitByte.getMode(),4);buffer.put(data.length,8);QR8bitByte.write(buffer,data);
        var totalCount=0;for(var i=0;i<rsBlocks.length;i++)totalCount+=rsBlocks[i].totalCount;
        while(buffer.getLengthInBits()>totalCount*8)throw new Error('Too much data');
        while(true){if(buffer.getLengthInBits()>=totalCount*8)break;buffer.putBit(false);if(buffer.getLengthInBits()>=totalCount*8)break;buffer.putBit(true);}
        return QRCode.createBytes(buffer,rsBlocks);
      };
      QRCode.createBytes=function(buffer,rsBlocks){
        var offset=0;var maxDcCount=0;var maxEcCount=0;
        var dcdata=new Array(rsBlocks.length);var ecdata=new Array(rsBlocks.length);
        for(var r=0;r<rsBlocks.length;r++){
          var dcCount=rsBlocks[r].dataCount;var ecCount=rsBlocks[r].totalCount-dcCount;
          maxDcCount=Math.max(maxDcCount,dcCount);maxEcCount=Math.max(maxEcCount,ecCount);
          dcdata[r]=new Array(dcCount);
          for(var i=0;i<dcdata[r].length;i++)dcdata[r][i]=0xff&buffer.getBuffer()[i+offset];
          offset+=dcCount;
          var rsPoly=QRRSBlock.getErrorCorrectPolynomial(ecCount);
          var rawPoly=new QRPolynomial(dcdata[r],rsPoly.getLength()-1);
          var modPoly=rawPoly.mod(rsPoly);
          ecdata[r]=new Array(rsPoly.getLength()-1);
          for(var i=0;i<ecdata[r].length;i++){var modIndex=i+modPoly.getLength()-ecdata[r].length;ecdata[r][i]=(modIndex>=0)?modPoly.get(modIndex):0;}
        }
        var totalCodeCount=0;for(var i=0;i<rsBlocks.length;i++)totalCodeCount+=rsBlocks[i].totalCount;
        var data=new Array(totalCodeCount);var index=0;
        for(var i=0;i<maxDcCount;i++){for(var r=0;r<rsBlocks.length;r++){if(i<dcdata[r].length)data[index++]=dcdata[r][i];}}
        for(var i=0;i<maxEcCount;i++){for(var r=0;r<rsBlocks.length;r++){if(i<ecdata[r].length)data[index++]=ecdata[r][i];}}
        return data;
      };
      QRCode.prototype.setupPositionProbePattern=function(row,col){
        for(var r=-1;r<=7;r++){for(var c=-1;c<=7;c++){
          if(row+r<=-1||this.moduleCount<=row+r||col+c<=-1||this.moduleCount<=col+c)continue;
          if((0<=r&&r<=6&&(c==0||c==6))||(0<=c&&c<=6&&(r==0||r==6))||(2<=r&&r<=4&&2<=c&&c<=4)){this.modules[row+r][col+c]=true;}
          else{this.modules[row+r][col+c]=false;}
        }}
      };
      QRCode.prototype.getPositionAdjustPattern=function(){return QRUtil.PATTERN_POSITION_TABLE[this.typeNumber-1];};
      QRCode.prototype.setupPositionAdjustPattern=function(){
        var pos=this.getPositionAdjustPattern();
        for(var i=0;i<pos.length;i++){for(var j=0;j<pos.length;j++){
          var row=pos[i];var col=pos[j];if(this.modules[row][col]!=null)continue;
          for(var r=-2;r<=2;r++){for(var c=-2;c<=2;c++){
            if(r==-2||r==2||c==-2||c==2||(r==0&&c==0)){this.modules[row+r][col+c]=true;}
            else{this.modules[row+r][col+c]=false;}
          }}
        }}
      };
      QRCode.prototype.setupTimingPattern=function(){
        for(var r=8;r<this.moduleCount-8;r++){if(this.modules[r][6]!=null)continue;this.modules[r][6]=(r%2==0);}
        for(var c=8;c<this.moduleCount-8;c++){if(this.modules[6][c]!=null)continue;this.modules[6][c]=(c%2==0);}
      };
      QRCode.prototype.setupTypeNumber=function(test){
        var bits=QRCode.getBCHTypeNumber(this.typeNumber);
        for(var i=0;i<18;i++){
          var mod=(!test&&((bits>>i)&1)==1);
          var row=Math.floor(i/3);var col=i%3;
          if(row<6){row=this.moduleCount-11+row;}else{row=row-6;}
          this.modules[row][col]=mod;
        }
      };
      QRCode.getBCHTypeNumber=function(data){
        var d=data<<12;while(QRCode.getBCHDigit(d)-QRCode.getBCHDigit(QRUtil.G18)>=0){d^=(QRUtil.G18<<(QRCode.getBCHDigit(d)-QRCode.getBCHDigit(QRUtil.G18)));}
        return ((data<<12)|d);
      };
      QRCode.getBCHDigit=function(data){var digit=0;while(data!=0){digit++;data>>>=1;}return digit;};
      QRCode.prototype.setupTypeInfo=function(test,maskPattern){
        var data=(QRUtil.ERROR_CORRECTION_TABLE[this.errorCorrectionLevel]<<3)|maskPattern;
        var bits=QRCode.getBCHTypeInfo(data);
        for(var i=0;i<15;i++){var mod=(!test&&((bits>>i)&1)==1);if(i<6){this.modules[i][8]=mod;}else if(i<8){this.modules[i+1][8]=mod;}else{this.modules[this.moduleCount-15+i][8]=mod;}}
        for(var i=0;i<15;i++){var mod=(!test&&((bits>>i)&1)==1);if(i<8){this.modules[8][this.moduleCount-1-i]=mod;}else{this.modules[8][15-i]=mod;}}
        this.modules[this.moduleCount-8][8]=(!test&&((bits>>15)&1)==1);
      };
      QRCode.getBCHTypeInfo=function(data){
        var d=data<<10;while(QRCode.getBCHDigit(d)-QRCode.getBCHDigit(QRUtil.G15)>=0){d^=(QRUtil.G15<<(QRCode.getBCHDigit(d)-QRCode.getBCHDigit(QRUtil.G15)));}
        return ((data<<10)|d);
      };
      QRCode.prototype.mapData=function(data,maskPattern){
        var inc=-1;var row=this.moduleCount-1;var bitIndex=7;var byteIndex=0;
        for(var col=this.moduleCount-1;col>0;col-=2){
          if(col==6)col--;
          while(true){
            for(var c=0;c<2;c++){
              if(this.modules[row][col-c]==null){
                var dark=false;if(byteIndex<data.length){dark=(((data[byteIndex]>>>bitIndex)&1)==1);}
                var mask=QRUtil.getMask(maskPattern,row,col-c);if(mask)dark=!dark;
                this.modules[row][col-c]=dark;
                bitIndex--;if(bitIndex==-1){byteIndex++;bitIndex=7;}
              }
            }
            row+=inc;if(row<0||this.moduleCount<=row){row-=inc;inc=-inc;break;}
          }
        }
      };
      QRUtil.getMask=function(maskPattern,i,j){
        switch(maskPattern){
          case 0:return(i+j)%2==0;case 1:return i%2==0;case 2:return j%3==0;case 3:return(i+j)%3==0;
          case 4:return(Math.floor(i/2)+Math.floor(j/3))%2==0;
          case 5:return(i*j)%2+(i*j)%3==0;case 6:return((i*j)%2+(i*j)%3)%2==0;
          case 7:return((i*j)%3+(i+j)%2)%2==0;default:throw new Error('bad maskPattern:'+maskPattern);
        }
      };
      QRUtil.getLostPoint=function(qrCode){
        var moduleCount=qrCode.getModuleCount();var lostPoint=0;
        for(var row=0;row<moduleCount;row++){for(var col=0;col<moduleCount;col++){
          var sameCount=0;var dark=qrCode.isDark(row,col);
          for(var r=-1;r<=1;r++){if(row+r<0||moduleCount<=row+r)continue;for(var c=-1;c<=1;c++){
            if(col+c<0||moduleCount<=col+c)continue;if(r==0&&c==0)continue;if(dark==qrCode.isDark(row+r,col+c))sameCount++;
          }}
          if(sameCount>5)lostPoint+=(3+sameCount-5);
        }}
        for(var row=0;row<moduleCount-1;row++){for(var col=0;col<moduleCount-1;col++){
          var count=0;if(qrCode.isDark(row,col))count++;if(qrCode.isDark(row+1,col))count++;if(qrCode.isDark(row,col+1))count++;if(qrCode.isDark(row+1,col+1))count++;
          if(count==0||count==4)lostPoint+=3;
        }}
        for(var row=0;row<moduleCount;row++){for(var col=0;col<moduleCount-6;col++){
          if(qrCode.isDark(row,col)&&!qrCode.isDark(row,col+1)&&qrCode.isDark(row,col+2)&&qrCode.isDark(row,col+3)&&qrCode.isDark(row,col+4)&&!qrCode.isDark(row,col+5)&&qrCode.isDark(row,col+6))lostPoint+=40;
        }}
        for(var col=0;col<moduleCount;col++){for(var row=0;row<moduleCount-6;row++){
          if(qrCode.isDark(row,col)&&!qrCode.isDark(row+1,col)&&qrCode.isDark(row+2,col)&&qrCode.isDark(row+3,col)&&qrCode.isDark(row+4,col)&&!qrCode.isDark(row+5,col)&&qrCode.isDark(row+6,col))lostPoint+=40;
        }}
        var darkCount=0;for(var row=0;row<moduleCount;row++){for(var col=0;col<moduleCount;col++){if(qrCode.isDark(row,col))darkCount++;}}
        var ratio=Math.abs(100*darkCount/moduleCount/moduleCount-50)/5;lostPoint+=ratio*10;return lostPoint;
      };
      QRCode.prototype.getBestTypeNumber=function(dataLength){
        for(var typeNumber=1;typeNumber<=40;typeNumber++){
          var rsBlocks=QRRSBlock.getRSBlocks(typeNumber,this.errorCorrectionLevel);
          var totalCount=0;for(var i=0;i<rsBlocks.length;i++)totalCount+=rsBlocks[i].totalCount;
          var capacity=Math.floor((totalCount*8-64)/8);if(capacity>=dataLength)return typeNumber;
        }
        return 40;
      };
      function drawQRCode(qrCode,size){
        var canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;
        var ctx=canvas.getContext('2d');var moduleCount=qrCode.getModuleCount();var moduleSize=size/moduleCount;
        for(var row=0;row<moduleCount;row++){for(var col=0;col<moduleCount;col++){
          ctx.fillStyle=qrCode.isDark(row,col)?'#000000':'#ffffff';ctx.fillRect(col*moduleSize,row*moduleSize,moduleSize,moduleSize);
        }}
        return canvas;
      }
      var qr=new QRCode();qr.addData(accessUrl);qr.make();
      var canvas=drawQRCode(qr,220);var img=document.createElement('img');img.src=canvas.toDataURL('image/png');
      qrContainer.innerHTML='';qrContainer.appendChild(img);
      saveBtn.addEventListener('click',function(){
        var link=document.createElement('a');link.download='班级助手2.0二维码.png';link.href=canvas.toDataURL('image/png');
        document.body.appendChild(link);link.click();document.body.removeChild(link);showToast('二维码保存成功');
      });
    })();
  </script>
</body>
